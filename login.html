<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login do Painel - Projeto TEAMO</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800 flex items-center justify-center p-4">
  <div class="w-full max-w-md rounded-3xl bg-white p-8 shadow-xl">
    <div class="mb-6 text-center">
      <p class="text-sm font-semibold uppercase tracking-[0.2em] text-sky-500">Projeto TEAMO</p>
      <h1 class="mt-2 text-3xl font-bold">Acesso ao painel</h1>
      <p class="mt-2 text-sm text-slate-500">Entre com seu login e senha para visualizar os cadastros.</p>
    </div>

    <div id="loginErro" class="mb-4 hidden rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700"></div>
    <div id="loginOk" class="mb-4 hidden rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700"></div>

    <form id="formLogin" class="space-y-4">
      <div>
        <label class="mb-2 block text-sm font-semibold">Login</label>
        <input id="username" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-sky-400" autocomplete="username" required />
      </div>
      <div>
        <label class="mb-2 block text-sm font-semibold">Senha</label>
        <input id="password" type="password" class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-sky-400" autocomplete="current-password" required />
      </div>
      <button class="w-full rounded-2xl bg-sky-500 px-4 py-3 font-semibold text-white shadow-sm">Entrar no painel</button>
    </form>

    <div class="mt-5 text-center">
      <a href="index.html#cadastro" class="text-sm font-semibold text-slate-500 hover:text-slate-700">Voltar ao formulário</a>
    </div>
  </div>

  
<script>
const API_CANDIDATES = [''];

function mostrarMensagemBox(id, tipo, texto) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = texto;
  el.classList.remove('hidden');
  el.classList.remove('border-rose-200','bg-rose-50','text-rose-700','border-emerald-200','bg-emerald-50','text-emerald-700');
  if (tipo === 'erro') {
    el.classList.add('border-rose-200','bg-rose-50','text-rose-700');
  } else {
    el.classList.add('border-emerald-200','bg-emerald-50','text-emerald-700');
  }
}

async function fetchJSONSmart(path, options) {
  var lastError = null;
  for (var i = 0; i < API_CANDIDATES.length; i++) {
    var base = API_CANDIDATES[i];
    var url = base + path;
    var controller = new AbortController();
    var timer = setTimeout(function(){ controller.abort(); }, 20000);
    try {
      var response = await fetch(url, { credentials: 'same-origin', cache: 'no-store', signal: controller.signal, ...options });
      var text = await response.text();
      var data = {};
      try { data = text ? JSON.parse(text) : {}; } catch (e) {
        throw new Error('Resposta inválida do servidor.');
      }
      if (!response.ok || data.ok === false) {
        throw new Error(data.message || 'Necessário fazer uma conta, para obter acesso.');
      }
      return data;
    } catch (error) {
      if (!lastError || (error && error.message && error.message !== 'Resposta inválida do servidor.')) lastError = error;
    } finally {
      clearTimeout(timer);
    }
  }
  if (lastError && lastError.name === 'AbortError') {
    throw new Error('O sistema demorou para responder. Tente novamente.');
  }
  if (lastError instanceof TypeError || /fetch/i.test(String((lastError && lastError.message) || ''))) {
    throw new Error('Não foi possível conectar ao sistema. Confira se o site foi publicado no Netlify e se as Functions estão habilitadas.');
  }
  throw lastError || new Error('Não foi possível conectar ao sistema.');
}

async function verificarServidorOnline() {
  await fetchJSONSmart('/api/health', { method: 'GET' });
}
</script>


  <script>
    var params = new URLSearchParams(window.location.search);
    var redirect = params.get('redirect') || 'admin.html';

    verificarServidorOnline()
      .then(function(){ return fetchJSONSmart('/api/auth-check', { method: 'GET' }); })
      .then(function(data){ if (data && data.authenticated) window.location.href = redirect; })
      .catch(function(error){ mostrarMensagemBox('loginErro', 'erro', error.message); });

    document.getElementById('formLogin').addEventListener('submit', async function(event){
      event.preventDefault();
      var erro = document.getElementById('loginErro');
      var ok = document.getElementById('loginOk');
      erro.classList.add('hidden');
      ok.classList.add('hidden');
      try {
        await verificarServidorOnline();
        var result = await fetchJSONSmart('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value.trim()
          })
        });
        window.location.href = redirect;
      } catch (error) {
        erro.textContent = 'Necessário fazer uma conta, para obter acesso.';
        erro.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
